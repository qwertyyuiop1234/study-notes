<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 360" role="img" aria-label="Softmax and cross entropy diagram">
<defs><marker id="a" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#2f6f68"/></marker><style>text{font-family:Inter,Arial,sans-serif;fill:#28231d}.card{fill:#fffdfa;stroke:#e4d9cc;stroke-width:2}.hi{fill:#f0e7dc;stroke:#9a4f32;stroke-width:3}.ln{stroke:#2f6f68;stroke-width:3;marker-end:url(#a)}</style></defs>
<rect x="20" y="20" width="940" height="320" rx="28" fill="#f7f4ee" stroke="#e4d9cc"/>
<text x="490" y="58" font-size="28" font-weight="900" text-anchor="middle">Scores → SoftMax probabilities → Cross Entropy loss</text>
<rect x="70" y="105" width="190" height="150" rx="22" class="card"/><text x="165" y="140" font-size="20" font-weight="900" text-anchor="middle">raw scores</text><text x="165" y="180" font-size="26" font-weight="900" text-anchor="middle">[2.0, 1.0, 0.1]</text><text x="165" y="220" font-size="15" text-anchor="middle">아직 확률분포 아님</text>
<path d="M270 180 H385" class="ln"/><rect x="395" y="100" width="210" height="160" rx="22" class="hi"/><text x="500" y="136" font-size="22" font-weight="900" text-anchor="middle">SoftMax</text><text x="500" y="176" font-size="19" font-weight="800" text-anchor="middle">exp(zᵢ) / Σ exp(zⱼ)</text><text x="500" y="220" font-size="24" font-weight="900" text-anchor="middle">[0.659, 0.242, 0.099]</text>
<path d="M615 180 H720" class="ln"/><rect x="730" y="105" width="190" height="150" rx="22" class="card"/><text x="825" y="140" font-size="20" font-weight="900" text-anchor="middle">Cross Entropy</text><text x="825" y="180" font-size="20" font-weight="900" text-anchor="middle">CE = -log(S_correct)</text><text x="825" y="220" font-size="22" font-weight="900" text-anchor="middle">≈ 0.417</text><text x="825" y="248" font-size="14" text-anchor="middle">정답 확률이 낮으면 penalty 증가</text>
</svg>