<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 360" role="img" aria-label="Perceptron weighted sum activation diagram">
<defs><marker id="a" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#9a4f32"/></marker><style>text{font-family:Inter,Arial,sans-serif;fill:#28231d}.box{fill:#fffdfa;stroke:#9a4f32;stroke-width:3}.soft{fill:#f0e7dc;stroke:#e4d9cc;stroke-width:2}.ln{stroke:#9a4f32;stroke-width:3;marker-end:url(#a)}</style></defs>
<rect x="20" y="20" width="940" height="320" rx="28" fill="#f7f4ee" stroke="#e4d9cc"/>
<text x="490" y="58" font-size="28" font-weight="900" text-anchor="middle">Perceptron = weighted sum + activation</text>
<g transform="translate(70 95)"><circle cx="0" cy="0" r="22" class="soft"/><circle cx="0" cy="70" r="22" class="soft"/><circle cx="0" cy="140" r="22" class="soft"/><text x="-45" y="7" font-size="18" font-weight="800">x₁</text><text x="-45" y="77" font-size="18" font-weight="800">x₂</text><text x="-45" y="147" font-size="18" font-weight="800">xₙ</text><path d="M25 0 L235 80" class="ln"/><path d="M25 70 L235 90" class="ln"/><path d="M25 140 L235 100" class="ln"/><text x="110" y="18" font-size="16" font-weight="800">w₁</text><text x="118" y="76" font-size="16" font-weight="800">w₂</text><text x="115" y="134" font-size="16" font-weight="800">wₙ</text></g>
<circle cx="360" cy="190" r="48" class="box"/><text x="360" y="198" font-size="34" font-weight="900" text-anchor="middle">Σ</text><text x="360" y="265" font-size="18" font-weight="800" text-anchor="middle">z = w·x + b</text><path d="M410 190 H545" class="ln"/>
<rect x="550" y="145" width="170" height="90" rx="22" class="box"/><text x="635" y="184" font-size="22" font-weight="900" text-anchor="middle">activation</text><text x="635" y="213" font-size="18" font-weight="800" text-anchor="middle">σ(z)</text><path d="M725 190 H845" class="ln"/>
<circle cx="875" cy="190" r="30" fill="#2f6f68"/><text x="875" y="198" fill="white" font-size="22" font-weight="900" text-anchor="middle">ŷ</text><text x="875" y="250" font-size="17" font-weight="800" text-anchor="middle">decision / probability</text>
</svg>