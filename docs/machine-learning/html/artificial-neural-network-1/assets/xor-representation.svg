<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 410" role="img" aria-label="XOR is not linearly separable but MLP transforms representation">
<defs><marker id="a" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#9a4f32"/></marker><style>text{font-family:Inter,Arial,sans-serif;fill:#28231d}.frame{fill:#fffdfa;stroke:#e4d9cc;stroke-width:2}.zero{fill:#b95145}.one{fill:#2f6f68}.ln{stroke:#9a4f32;stroke-width:3;marker-end:url(#a)}</style></defs>
<rect x="20" y="20" width="940" height="370" rx="28" fill="#f7f4ee" stroke="#e4d9cc"/>
<text x="490" y="58" font-size="28" font-weight="900" text-anchor="middle">XOR: linearly inseparable → hidden representation → separable</text>
<rect x="70" y="95" width="330" height="240" rx="20" class="frame"/><text x="235" y="125" font-size="18" font-weight="900" text-anchor="middle">input space</text><line x1="115" y1="295" x2="355" y2="295" stroke="#28231d"/><line x1="115" y1="295" x2="115" y2="155" stroke="#28231d"/><circle cx="145" cy="270" r="18" class="zero"/><text x="145" y="277" fill="white" font-weight="900" text-anchor="middle">0</text><circle cx="325" cy="270" r="18" class="one"/><text x="325" y="277" fill="white" font-weight="900" text-anchor="middle">1</text><circle cx="145" cy="170" r="18" class="one"/><text x="145" y="177" fill="white" font-weight="900" text-anchor="middle">1</text><circle cx="325" cy="170" r="18" class="zero"/><text x="325" y="177" fill="white" font-weight="900" text-anchor="middle">0</text><text x="235" y="323" font-size="14" text-anchor="middle">직선 하나로는 1과 0을 분리 불가</text>
<path d="M415 215 H540" class="ln"/><text x="478" y="195" font-size="16" font-weight="900" text-anchor="middle">MLP hidden layer</text>
<rect x="565" y="95" width="340" height="240" rx="20" class="frame"/><text x="735" y="125" font-size="18" font-weight="900" text-anchor="middle">hidden feature space</text><line x1="610" y1="295" x2="860" y2="295" stroke="#28231d"/><line x1="610" y1="295" x2="610" y2="155" stroke="#28231d"/><circle cx="640" cy="270" r="18" class="zero"/><text x="640" y="277" fill="white" font-weight="900" text-anchor="middle">0</text><circle cx="835" cy="270" r="18" class="one"/><text x="835" y="277" fill="white" font-weight="900" text-anchor="middle">1</text><circle cx="835" cy="170" r="18" class="zero"/><text x="835" y="177" fill="white" font-weight="900" text-anchor="middle">0</text><line x1="595" y1="220" x2="880" y2="220" stroke="#2f6f68" stroke-width="5"/><text x="735" y="323" font-size="14" text-anchor="middle">새 좌표에서는 직선 하나로 분리 가능</text>
</svg>